version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hiresignal-postgres
    environment:
      POSTGRES_DB: hiresignal
      POSTGRES_USER: hiresignal
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiresignal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hiresignal-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hiresignal-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - upload_data:/app/data/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://hiresignal:password@postgres:5432/hiresignal
      - SYNC_DATABASE_URL=postgresql://hiresignal:password@postgres:5432/hiresignal
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - UPLOAD_DIR=/app/data/uploads
      - JWT_SECRET_KEY=dev-secret-change-in-prod
      - DEBUG=true
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    container_name: hiresignal-worker
    working_dir: /app
    command: celery -A app.workers.celery_app worker -Q critical,default,bulk -c 4 --loglevel=info
    volumes:
      - ./backend:/app
      - upload_data:/app/data/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://hiresignal:password@postgres:5432/hiresignal
      - SYNC_DATABASE_URL=postgresql://hiresignal:password@postgres:5432/hiresignal
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/data/uploads
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - backend

  frontend:
    build: ./frontend
    container_name: hiresignal-frontend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"

  nginx:
    image: nginx:alpine
    container_name: hiresignal-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    command: nginx -g 'daemon off;'

volumes:
  postgres_data:
  upload_data:

networks:
  default:
    name: hiresignal-network
